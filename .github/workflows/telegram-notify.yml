name: Notify Sven on Telegram

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="<b>Invoice Parser MCP</b> push to <code>${{ github.ref_name }}</code>%0ABy: ${{ github.actor }}%0ASHA: <code>${SHORT_SHA}</code>"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=${MSG}" | grep -q '"ok":true' && echo "sent" || echo "failed"
